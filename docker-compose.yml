version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coding_platform_db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: coding_platform
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: coding_platform_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/coding_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres

  frontend:
    build:
      context: ./frontend
    container_name: coding_platform_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
